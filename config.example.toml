# GPT Plus 模拟器 配置示例
# 复制为 config.toml 后按需修改; 也可通过环境变量覆盖

[mumu]
# adb 路径, 留空则自动检测默认 MuMu 安装位置
adb_path = ""
# 设备序列号, 留空则自动枚举 adb devices
serial = ""
# 候选 adb 路径 (自动检测时使用)
adb_candidates = [
    "D:\\Program Files\\Netease\\MuMuPlayer-12.0\\nx_device\\12.0\\shell\\adb.exe",
    "C:\\Program Files\\Netease\\MuMuPlayer-12.0\\nx_device\\12.0\\shell\\adb.exe",
]
serial_candidates = ["127.0.0.1:5555", "127.0.0.1:7555"]

[mitm]
host = "0.0.0.0"
port = 8888
# 上游翻墙代理 (例如 Clash), 留空表示直连
upstream_proxy = "http://127.0.0.1:7890"
# 不拦截这些域名 (Google Play 证书固定, 必须透传)
ignore_hosts_regex = "googleapis\\.com|google\\.com|gstatic\\.com|googleusercontent\\.com|googlevideo\\.com|nie\\.netease\\.com|netease\\.com|mumu"

[api]
# RevenueCat 公开 API Key (GPT Android app 内置公钥, 非个人配置, 仅供学习研究)
revenuecat_api_key = "goog_DPguJtknNxbQBStStwhWGRsghUw"
revenuecat_url = "https://api.revenuecat.com/v1/receipts"
openai_account_check_url = "https://android.chat.openai.com/backend-api/accounts/check/v4-2023-04-27"
product_id = "oai.chatgpt.plus"
entitlement_id = "chatgpt_plus"

[files]
token_queue = "tokens.jsonl"
mitm_ca_pem = ""  # 默认 ~/.mitmproxy/mitmproxy-ca-cert.pem
